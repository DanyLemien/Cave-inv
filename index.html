<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cave">
<meta name="theme-color" content="#ECEAE5">
<title>Cave à vin</title>
<style>
:root{
  --bg:#ECEAE5; --surface:#FBFAF8; --surface2:#F3F1EC; --ink:#241A1C; --soft:#6B5F60;
  --line:#DAD4C9; --brass:#A6813C; --accent:#6E1423; --accent-ink:#FFFFFF;
  --ok:#2F6B43; --warn:#9A5B12; --danger:#8A2233;
  --serif:ui-serif,"New York",Georgia,"Times New Roman",serif;
  --sans:ui-sans-serif,-apple-system,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
  --pad:16px; --r:14px; --lh:1.4;
}
*{box-sizing:border-box}
html{font-size:17px}
html[data-size="petit"]{font-size:15px}
html[data-size="grand"]{font-size:19px}
body{
  margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:1rem;line-height:var(--lh);-webkit-text-size-adjust:100%;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
  padding-top:env(safe-area-inset-top);
}
h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0}
.mono{font-family:var(--mono)}
button{font-family:inherit;font-size:1rem;color:inherit}
input,select,textarea{font-family:inherit;font-size:max(16px,1rem);color:var(--ink)}
a{color:var(--accent)}

/* Topbar */
#topbar{position:sticky;top:0;z-index:20;background:rgba(236,234,229,.92);
  -webkit-backdrop-filter:saturate(1.2) blur(8px);backdrop-filter:saturate(1.2) blur(8px);
  border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 6px) var(--pad) 8px;}
.tb-row{display:flex;align-items:center;gap:10px;min-height:34px}
.tb-title{font-family:var(--serif);font-size:1.35rem;letter-spacing:.2px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-eyebrow{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--brass);display:block;margin-bottom:1px}
.tb-btn{background:none;border:0;padding:6px 4px;color:var(--accent);font-size:1rem;cursor:pointer}
.tb-btn:disabled{color:var(--soft);opacity:.5}

/* Screen */
#screen{padding:var(--pad);max-width:760px;margin:0 auto}
.section{margin:0 0 22px}
.section>.lbl{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--soft);margin:0 2px 8px;display:flex;align-items:center;gap:8px}
.section>.lbl::after{content:"";flex:1;height:1px;background:var(--line)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.card+.card{margin-top:10px}
.row{display:flex;gap:12px;align-items:center}
.grow{flex:1;min-width:0}
.muted{color:var(--soft)}
.small{font-size:.82rem}
.tiny{font-size:.72rem}
.center{text-align:center}
.stack>*+*{margin-top:10px}

/* Capsule (couleur du vin) */
.cap{width:12px;align-self:stretch;min-height:38px;border-radius:6px;flex:none;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.dot{width:12px;height:12px;border-radius:50%;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}

/* Coordonnée casier (style registre) */
.coord{font-family:var(--mono);font-size:.78rem;background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;padding:2px 7px;white-space:nowrap}
.badge{font-family:var(--mono);font-size:.72rem;background:var(--ink);color:#fff;border-radius:999px;
  padding:2px 9px;white-space:nowrap}
.badge.acc{background:var(--accent)}
.badge.ctrl{background:var(--warn)}
.badge.out{background:var(--surface2);color:var(--soft)}
.pill{display:inline-flex;gap:6px;align-items:center;font-size:.8rem;background:var(--surface2);
  border:1px solid var(--line);border-radius:999px;padding:4px 10px;margin:0 6px 6px 0}

/* Wine list item */
.item{display:flex;gap:12px;align-items:stretch;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.item:active{background:var(--surface2)}
.item .name{font-family:var(--serif);font-size:1.06rem;line-height:1.2}
.item .sub{color:var(--soft);font-size:.82rem;margin-top:2px}
.item .meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}

/* Cave grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;
  cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:8px;min-height:96px}
.tile:active{background:var(--surface2)}
.tile .num{font-family:var(--serif);font-size:1.5rem;line-height:1}
.tile .cnt{font-family:var(--mono);font-size:.8rem;color:var(--soft)}
.tile .bar{height:4px;border-radius:4px;background:var(--accent);opacity:.85}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:1px solid var(--accent);background:var(--accent);color:var(--accent-ink);
  border-radius:12px;padding:13px 16px;font-weight:600;cursor:pointer}
.btn:active{filter:brightness(.94)}
.btn.ghost{background:var(--surface);color:var(--accent)}
.btn.flat{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn.danger{background:var(--surface);color:var(--danger);border-color:var(--danger)}
.btn.sm{width:auto;padding:9px 13px;font-weight:500;font-size:.9rem}
.btnrow{display:flex;gap:10px}
.btnrow>.btn{flex:1}

/* Inputs */
.field{margin-bottom:12px}
.field>label{display:block;font-size:.8rem;color:var(--soft);margin:0 2px 5px}
.inp{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:12px 13px;outline:none}
.inp:focus{border-color:var(--accent)}
textarea.inp{min-height:70px;resize:vertical}
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:0 12px;margin-bottom:12px}
.search input{border:0;background:none;outline:none;padding:13px 0;flex:1}
.search svg{flex:none;color:var(--soft)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Segmented */
.seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:0;background:none;border-radius:8px;padding:9px 6px;color:var(--soft);
  font-size:.86rem;cursor:pointer}
.seg button[aria-pressed="true"]{background:var(--surface);color:var(--ink);font-weight:600;
  box-shadow:0 1px 2px rgba(0,0,0,.06)}

/* Stepper */
.step{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--surface)}
.step button{width:42px;height:42px;border:0;background:none;font-size:1.3rem;color:var(--accent);cursor:pointer}
.step .val{min-width:44px;text-align:center;font-family:var(--mono);font-size:1rem}

/* Chips select (filtres cascade rendus en select) */
.selwrap{position:relative}
.selwrap select{width:100%;-webkit-appearance:none;appearance:none;background:var(--surface);
  border:1px solid var(--line);border-radius:11px;padding:12px 34px 12px 13px}
.selwrap::after{content:"⌄";position:absolute;right:14px;top:9px;color:var(--soft);pointer-events:none;font-size:1.1rem}

/* Banner */
.banner{background:var(--surface);border:1px solid var(--brass);border-left:4px solid var(--brass);
  border-radius:12px;padding:12px 14px;margin-bottom:16px}
.banner.acc{border-color:var(--accent);border-left-color:var(--accent)}

/* Facts table */
.facts{width:100%;border-collapse:collapse}
.facts td{padding:8px 0;border-bottom:1px solid var(--line);vertical-align:top}
.facts td:first-child{color:var(--soft);width:42%;font-size:.86rem;padding-right:10px}
.facts tr:last-child td{border-bottom:0}

/* Modal */
#modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
.scrim{position:absolute;inset:0;background:rgba(20,12,14,.4)}
.sheet{position:relative;background:var(--bg);width:100%;max-width:760px;border-radius:18px 18px 0 0;
  border:1px solid var(--line);padding:18px var(--pad) calc(18px + env(safe-area-inset-bottom));
  max-height:86vh;overflow:auto}
.sheet h2{font-size:1.25rem;margin-bottom:6px}

/* Checkbox rows */
.ck{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--line);border-radius:12px;
  background:var(--surface);cursor:pointer}
.ck input{width:20px;height:20px;accent-color:var(--accent)}
.ck+.ck{margin-top:8px}

hr.sep{border:0;border-top:1px solid var(--line);margin:16px 0}
.empty{text-align:center;color:var(--soft);padding:38px 10px}
.empty .big{font-family:var(--serif);font-size:1.15rem;color:var(--ink);margin-bottom:6px}

/* Tabbar */
#tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
  background:rgba(236,234,229,.94);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#tabbar button{flex:1;border:0;background:none;padding:9px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;color:var(--soft);font-size:.66rem;cursor:pointer}
#tabbar button[aria-current="true"]{color:var(--accent)}
#tabbar svg{width:23px;height:23px}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@media (min-width:620px){ .grid{grid-template-columns:repeat(3,1fr)} }
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
table.tbl{border-collapse:collapse;width:100%;font-size:.85rem}
table.tbl th,table.tbl td{padding:9px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line);vertical-align:middle}
table.tbl thead th{background:var(--surface2);font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
table.tbl th.sortable{cursor:pointer;-webkit-user-select:none;user-select:none}
table.tbl th.sortable:active{background:var(--line)}
table.tbl th .arw{color:var(--accent)}
table.tbl td.num,table.tbl th.num{text-align:right;font-family:var(--mono)}
table.tbl tbody tr{cursor:pointer}
table.tbl tbody tr:active{background:var(--surface2)}
table.tbl tbody tr:last-child td{border-bottom:0}
table.tbl tr.sel{background:var(--surface2)}
table.tbl tr.sel td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
table.tbl .selcol{width:40px;text-align:center;padding-left:10px;padding-right:6px}
table.tbl input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);vertical-align:middle}
table.tbl .dot{width:11px;height:11px;border-radius:50%}
.step.off{opacity:.4}
.step.off button{color:var(--soft);cursor:default}
.seg.off{opacity:.38;filter:grayscale(.35)}
.seg.off button{cursor:default;color:var(--soft)}
button[disabled]{cursor:default}
.btn[disabled]{opacity:.45;filter:grayscale(.2);cursor:default}
.btn[disabled]:active{filter:grayscale(.2)}
.seg.pa button[aria-pressed="true"][data-v="1"]{background:var(--ok);color:#fff;box-shadow:none}
.seg.pa button[aria-pressed="true"][data-v="0"]{background:var(--danger);color:#fff;box-shadow:none}
.seg.etq button[aria-pressed="true"][data-v="Oui"]{background:var(--ok);color:#fff;box-shadow:none}
.seg.etq button[aria-pressed="true"][data-v="Non"]{background:var(--warn);color:#fff;box-shadow:none}
.lnk-reset{background:none;border:0;color:var(--danger);font-size:.78rem;text-decoration:underline;cursor:pointer;padding:4px 2px}
input[type=range]{accent-color:var(--accent);width:100%}
.swatches{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.swatch{display:flex;align-items:center;gap:9px;font-size:.85rem;cursor:pointer}
.swatch input[type=color]{width:36px;height:36px;padding:0;border:1px solid var(--line);border-radius:9px;background:none;cursor:pointer;flex:none}
#toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:.9rem;line-height:1.35;max-width:88%;
  text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.28);opacity:0;pointer-events:none;z-index:80;white-space:pre-line;
  transition:opacity .18s ease,transform .18s ease}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* ==== v5 ==== */
.fltrow{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 34px 12px 13px;position:relative;margin-bottom:8px;cursor:pointer;display:block;font-size:1rem;color:var(--ink)}
.fltrow::after{content:"⌄";position:absolute;right:14px;top:9px;color:var(--soft);font-size:1.1rem}
.fltrow.on{border-color:var(--accent)}
.fltrow .fcol{color:var(--soft);font-size:.78rem;letter-spacing:.04em}
.fltrow .fval{font-weight:600}
.chipbar{display:flex;flex-wrap:wrap;gap:6px;margin:2px 2px 12px;align-items:center}
.fchip{display:inline-flex;align-items:center;gap:7px;font-size:.82rem;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 11px}
.fchip button{border:0;background:var(--line);color:var(--ink);border-radius:50%;width:19px;height:19px;line-height:1;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.spec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:2px 16px}
.spec .srow{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid var(--line)}
.spec .srow:last-child{border-bottom:0}
.spec .sk{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);flex:none;padding-top:3px}
.spec .sv{text-align:right;font-size:1.08rem;line-height:1.3;color:var(--ink)}
.spec .srow.block{flex-direction:column;align-items:stretch;gap:7px}
.spec .srow.block .sv{text-align:left;font-size:.98rem;color:var(--soft)}
.qexp{display:flex;align-items:center;gap:11px;margin-top:9px;flex-wrap:wrap}
.qexp-k{font-size:.75rem;color:var(--soft);letter-spacing:.02em}
.qexp-v{font-family:var(--serif);font-size:1.8rem;line-height:1;color:var(--ink);font-weight:600}
</style>
</head>
<body>
<header id="topbar"><div class="tb-row"><div class="tb-title">Cave à vin</div></div></header>
<main id="screen"></main>
<nav id="tabbar"></nav>
<div id="modal"><div class="scrim" data-a="closeModal"></div><div class="sheet" id="sheet"></div></div>
<input type="file" id="fileInput" accept=".csv,text/csv" hidden>

<script>
"use strict";
/* ============================================================= *
 * Cave à vin — application fichier unique, hors ligne.
 * CSV maître = 21 colonnes ; séparateur ";" ; encodage utf-8-sig.
 * Le CSV importé n'est jamais modifié : tout passe par la session,
 * la validation produit un NOUVEAU CSV + un TXT historique.
 * v2 : contrôle d'inventaire — Terminer bloqué tant qu'un casier
 * commencé a un vin non pointé ; états Présent/Absent/Étiquette colorés.
 * ============================================================= */

/* ---------- Constantes ---------- */
var DELIM=";";
var COLS=["Propriété","Nom","Année","Couleur","Pays","Région","Appellation","Cépages","Volume",
"Localisation","Date entrée","Prix","En cave","Date dégustation","Convives","Evénement","Mets",
"Commentaire","Photo_etiquette_devant","Photo_etiquette_derriere","Photo_facture"];
var CAP={"Vin rouge":"#7B1E2B","Vin blanc":"#C9A227","Vin rosé":"#D98A8A","Fermenté":"#7A8450","Spiritueux":"#8A6D3B"};
function capColor(c){return CAP[(c||"").trim()]||"#9A9186";}
var ACCENTS={bordeaux:"#6E1423",bourgogne:"#5E2129",ardoise:"#38505A",foret:"#2F4739"};
var LIST_COLS=["Propriété","Couleur","Pays","Région","Appellation","Cépages","Volume","Convives","Evénement","Mets"];
var K={snap:"cave_snap_v1",set:"cave_set_v1",lists:"cave_lists_v1"};

/* ---------- Stockage local (tolérant au bac à sable) ---------- */
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

/* ---------- Fonctions données (validées 20/20) ---------- */
function parseCSV(text,d){d=d||DELIM;if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  var rows=[],f="",row=[],q=false,i=0,n=text.length;
  while(i<n){var c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===d){row.push(f);f="";i++;continue;}
    if(c==="\r"){i++;continue;}
    if(c==="\n"){row.push(f);rows.push(row);row=[];f="";i++;continue;}
    f+=c;i++;}
  if(f.length>0||row.length>0){row.push(f);rows.push(row);}return rows;}
function rowsToObjects(m){if(!m.length)return{headers:[],data:[]};
  var headers=m[0].map(function(h){return h.trim();}),data=[];
  for(var r=1;r<m.length;r++){var cells=m[r];if(cells.length===1&&cells[0]==="")continue;
    var o={};for(var c=0;c<headers.length;c++)o[headers[c]]=(cells[c]!=null?cells[c]:"");data.push(o);}
  return{headers:headers,data:data};}
function csvEscape(v,d){d=d||DELIM;v=(v==null)?"":String(v);
  if(v.indexOf('"')!==-1||v.indexOf(d)!==-1||v.indexOf("\n")!==-1||v.indexOf("\r")!==-1)return '"'+v.replace(/"/g,'""')+'"';
  return v;}
function serializeCSV(headers,data,d){d=d||DELIM;
  var lines=[headers.map(function(h){return csvEscape(h,d);}).join(d)];
  for(var i=0;i<data.length;i++){var r=data[i];
    lines.push(headers.map(function(h){return csvEscape(r[h],d);}).join(d));}
  return "\uFEFF"+lines.join("\r\n")+"\r\n";}
function parseLoc(s){s=(s||"").trim();var m=s.match(/^(\d+)\s*Cave\s*,\s*(\d+)\s*\/\s*(\d+)/i);
  if(m)return{cave:+m[1],ligne:+m[2],casier:+m[3],placed:true};
  return{cave:null,ligne:null,casier:null,placed:false,raw:s};}
function buildLoc(cave,ligne,casier){return cave+" Cave, "+ligne+"/"+casier;}
function wineKey(r){return ["Propriété","Nom","Année","Volume","Couleur"]
  .map(function(k){return (r[k]||"").trim().toLowerCase();}).join("\u00A6");}

/* ---------- Aides ---------- */
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){
  return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function pad2(n){return String(n).padStart(2,"0");}
function pad3(n){return String(n).padStart(3,"0");}
function now(){return new Date();}
function todayCSV(){var d=now();return pad2(d.getDate())+"/"+pad2(d.getMonth()+1)+"/"+d.getFullYear();}
function toDots(s){s=(s||"").trim();return s?s.replace(/\//g,"."):"";}
function yymmdd(){var d=now();return String(d.getFullYear()).slice(2)+pad2(d.getMonth()+1)+pad2(d.getDate());}
function stamp(){var d=now();return pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+d.getFullYear()+" "+pad2(d.getHours())+":"+pad2(d.getMinutes());}
function money(x){var n=parseFloat(String(x).replace(",","."));if(isNaN(n))return "—";
  return n.toLocaleString("de-CH",{minimumFractionDigits:2,maximumFractionDigits:2})+" CHF";}
function money0(x){var n=parseFloat(String(x).replace(",","."));if(isNaN(n))return "—";return Math.trunc(n).toLocaleString("de-CH")+" CHF";}
function isStock(r){var e=(r["En cave"]||"").trim();return e==="1"||e==="2";}
function isCtrl(r){return (r["En cave"]||"").trim()==="2";}

/* ---------- État ---------- */
var state={
  headers:COLS.slice(),data:[],fileName:"",loaded:false,
  session:[],dirty:false,nextId:1,
  settings:{accent:"bordeaux",size:"normal",lastCave:true,projet:"Cave",counter:{}},
  lists:{},
  inv:{cave:null,ligne:null,casier:null,progress:{}},
  route:{name:"accueil",p:{}}
};

/* ---------- Démonstration (clairement étiquetée) ---------- */

function loadData(objs,name){
  state.data=[];state.nextId=1;
  for(var i=0;i<objs.length;i++){var o=objs[i];o._id=String(state.nextId++);state.data.push(o);}
  state.headers=(objs.headers&&objs.headers.length)?objs.headers:COLS.slice();
  state.fileName=name||"";state.loaded=true;state.session=[];state.dirty=false;
  state.inv={cave:null,ligne:null,casier:null,progress:{}};
  refreshLists();saveSnapshot();
}

/* ---------- Listes enrichies (grandissent, ne rétrécissent pas) ---------- */
function distinct(col){var s={},out=[];for(var i=0;i<state.data.length;i++){
  var v=(state.data[i][col]||"").trim();if(v&&!s[v]){s[v]=1;out.push(v);}}
  out.sort(function(a,b){return a.localeCompare(b,"fr");});return out;}
function refreshLists(){for(var i=0;i<LIST_COLS.length;i++){var col=LIST_COLS[i];
  var set={};(state.lists[col]||[]).forEach(function(v){set[v]=1;});
  distinct(col).forEach(function(v){set[v]=1;});
  state.lists[col]=Object.keys(set).sort(function(a,b){return a.localeCompare(b,"fr");});}
  saveLists();}
function dl(col,id){var opts=(state.lists[col]||[]).map(function(v){return "<option value=\""+esc(v)+"\">";}).join("");
  return "<datalist id=\""+id+"\">"+opts+"</datalist>";}

/* ---------- Regroupements ---------- */
function groupWines(rows){var map={},order=[];
  for(var i=0;i<rows.length;i++){var r=rows[i],k=wineKey(r);
    if(!map[k]){map[k]={key:k,repId:r._id,rep:r,count:0,ctrl:0,lots:{}};order.push(k);}
    var g=map[k];g.count++;if(isCtrl(r))g.ctrl++;
    var lk=(r["Localisation"]||"").trim()||"Non placé";g.lots[lk]=(g.lots[lk]||0)+1;}
  var arr=order.map(function(k){return map[k];});
  arr.sort(function(a,b){return (a.rep["Propriété"]||"").localeCompare(b.rep["Propriété"]||"","fr")
    ||(a.rep["Année"]||"").localeCompare(b.rep["Année"]||"");});return arr;}
function stockOfCave(n){return state.data.filter(function(r){return isStock(r)&&parseLoc(r["Localisation"]).cave===n;});}
function stockNonPlace(){return state.data.filter(function(r){return isStock(r)&&!parseLoc(r["Localisation"]).placed;});}
function lignesOf(cave){var s={};stockOfCave(cave).forEach(function(r){var l=parseLoc(r["Localisation"]).ligne;if(l!=null)s[l]=1;});
  return Object.keys(s).map(Number).sort(function(a,b){return a-b;});}
function casiersOf(cave,ligne){var s={};stockOfCave(cave).forEach(function(r){var p=parseLoc(r["Localisation"]);
  if(p.ligne===ligne&&p.casier!=null)s[p.casier]=1;});
  return Object.keys(s).map(Number).sort(function(a,b){return a-b;});}
function lotsOfCasier(cave,ligne,casier){var loc=buildLoc(cave,ligne,casier);
  return groupWines(state.data.filter(function(r){return isStock(r)&&(r["Localisation"]||"").trim()===loc;}));}
function rowsAtLoc(loc,onlyStock){return state.data.filter(function(r){
  return (r["Localisation"]||"").trim()===loc&&(!onlyStock||isStock(r));});}

/* ---------- Persistance session ---------- */
function saveSnapshot(){if(!state.loaded)return;
  var snap={v:1,headers:state.headers,fileName:state.fileName,data:state.data,
    session:state.session,dirty:state.dirty,nextId:state.nextId,inv:state.inv};
  lsSet(K.snap,JSON.stringify(snap));}
function readSnapshot(){var s=lsGet(K.snap);if(!s)return null;try{return JSON.parse(s);}catch(e){return null;}}
function applySnapshot(snap){state.headers=snap.headers||COLS.slice();state.fileName=snap.fileName||"";
  state.data=snap.data||[];state.session=snap.session||[];state.dirty=!!snap.dirty;
  state.nextId=snap.nextId||(state.data.length+1);state.inv=snap.inv||{cave:null,ligne:null,casier:null,progress:{}};
  state.loaded=state.data.length>0;refreshLists();}
function saveSettings(){lsSet(K.set,JSON.stringify(state.settings));}
function loadSettings(){var s=lsGet(K.set);if(s){try{var o=JSON.parse(s);for(var k in o)state.settings[k]=o[k];}catch(e){}}}
function saveLists(){lsSet(K.lists,JSON.stringify(state.lists));}
function loadLists(){var s=lsGet(K.lists);if(s){try{state.lists=JSON.parse(s)||{};}catch(e){}}}

function logChange(type,txt){state.session.push({t:stamp(),type:type,txt:txt});state.dirty=true;}
function commit(){refreshLists();saveSnapshot();}

var DESIGN_DEFAULT={bg:"#ECEAE5",surface:"#FBFAF8",surface2:"#F3F1EC",ink:"#241A1C",soft:"#6B5F60",line:"#DAD4C9",brass:"#A6813C",accent:"#6E1423",size:17,lh:1.4,pad:16,r:14};
function ensureDesign(){var s=state.settings;if(!s.design)s.design={};var d=s.design;
  if(typeof s.accent==="string"){if(ACCENTS[s.accent]&&d.accent==null)d.accent=ACCENTS[s.accent];delete s.accent;}
  if(typeof s.size==="string"){if(d.size==null)d.size=(s.size==="petit"?15:s.size==="grand"?19:17);delete s.size;}
  for(var k in DESIGN_DEFAULT)if(d[k]==null)d[k]=DESIGN_DEFAULT[k];
  return d;}
function hexToRgb(h){h=(h||"").replace("#","");if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];if(h.length!==6)return null;
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}
function contrastInk(hex){var c=hexToRgb(hex);if(!c)return "#FFFFFF";var l=(c.r*299+c.g*587+c.b*114)/1000;return l>140?"#241A1C":"#FFFFFF";}
function applyTheme(){var d=ensureDesign();var r=document.documentElement.style;
  r.setProperty("--bg",d.bg);r.setProperty("--surface",d.surface);r.setProperty("--surface2",d.surface2);
  r.setProperty("--ink",d.ink);r.setProperty("--soft",d.soft);r.setProperty("--line",d.line);
  r.setProperty("--brass",d.brass);r.setProperty("--accent",d.accent);r.setProperty("--accent-ink",contrastInk(d.accent));
  r.setProperty("--pad",d.pad+"px");r.setProperty("--r",d.r+"px");r.setProperty("--lh",String(d.lh));
  r.fontSize=d.size+"px";document.documentElement.removeAttribute("data-size");}

var CAVE_SORTS=[["dom","Domaine"],["annee","Année"],["prix","Prix"],["qte","Quantité"],["empl","Emplacement"]];
function sortGroups(arr,key,dir){var m=dir==="desc"?-1:1;
  arr.sort(function(a,b){var va,vb;
    if(key==="annee"){va=parseInt(a.rep["Année"],10)||0;vb=parseInt(b.rep["Année"],10)||0;}
    else if(key==="prix"){va=parseFloat(String(a.rep["Prix"]).replace(",","."));vb=parseFloat(String(b.rep["Prix"]).replace(",","."));if(isNaN(va))va=-1;if(isNaN(vb))vb=-1;}
    else if(key==="qte"){va=a.count;vb=b.count;}
    else if(key==="empl"){va=emplSort(a);vb=emplSort(b);}
    else{va=((a.rep["Propriété"]||"")+" "+(a.rep["Nom"]||"")).toLowerCase();vb=((b.rep["Propriété"]||"")+" "+(b.rep["Nom"]||"")).toLowerCase();}
    if(va<vb)return -1*m;if(va>vb)return 1*m;
    var pa=(a.rep["Propriété"]||"").toLowerCase(),pb=(b.rep["Propriété"]||"").toLowerCase();return pa<pb?-1:pa>pb?1:0;});
  return arr;}
SCR.cave=function(p){
  var c=+p.c;var title=c===0?"Non placé":"Cave "+c;
  var rows=c===0?stockNonPlace():stockOfCave(c);
  var groups=groupWines(rows);
  topbar("Liste des vins",title,{back:"accueil"});
  var q=(p.q||"").toLowerCase();
  var shown=groups.filter(function(g){if(!q)return true;
    return [g.rep["Propriété"],g.rep["Nom"],g.rep["Appellation"],g.rep["Région"],g.rep["Pays"],g.rep["Cépages"],g.rep["Année"]]
      .join(" ").toLowerCase().indexOf(q)!==-1;});
  var sk=p.sort||"dom",sd=p.dir||"asc";sortGroups(shown,sk,sd);
  var html='<div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>'

    +'<button class="btn sm flat" data-a="cave-dir" style="width:auto">'+(sd==="asc"?"▲":"▼")+'</button></div>';

};

  var pointed=0;for(var i=0;i<lots.length;i++){var lp=p.lots[lots[i].key];if(lp&&lp.status)pointed++;}
  if(pointed===0)return true;
  return pointed===lots.length;
}

function entryLoc(e){var m=(e.txt||"").match(/(\d+)\s*Cave,\s*(\d+)\s*\/\s*(\d+)/);
  return m?(+m[1])*1000000+(+m[2])*1000+(+m[3]):Infinity;}
SCR.validation=function(){
  topbar("Validation","Générer une nouvelle version",{back:"accueil"});
  var counter=(state.settings.counter[String(now().getFullYear())]||0)+1;
  var name=(state.settings.projet||"Cave")+"_"+yymmdd()+"_"+pad3(counter);
  var html='<div class="banner"><div class="small">Le CSV d\'origine n\'est pas touché. Cette action crée <b>'+esc(name)+'.csv</b> (données) et <b>'+esc(name)+'.txt</b> (historique).</div></div>';
  if(!state.dirty)html+='<div class="card small muted">Aucune modification en attente. Vous pouvez tout de même exporter l\'état actuel.</div>';
  else{html+='<div class="section"><div class="lbl">Modifications ('+state.session.length+') · par emplacement</div><div class="stack">'
    +state.session.slice().sort(function(a,b){return entryLoc(a)-entryLoc(b);}).map(function(e){return '<div class="card"><div class="row"><span class="coord">'+esc(e.type)+'</span><div class="grow small">'+esc(e.txt)+'</div></div><div class="tiny muted" style="margin-top:4px">'+esc(e.t)+'</div></div>';}).join("")+'</div></div>';}
  html+='<div class="section"><button class="btn" data-a="do-export" data-name="'+esc(name)+'">Générer le CSV et le TXT</button>'
    +'<button class="btn flat" style="margin-top:10px" data-a="accueil">Retour</button></div>';
  document.getElementById("screen").innerHTML=html;
};
function buildTXT(name){
  var stock=state.data.filter(isStock),bus=state.data.filter(function(r){return (r["En cave"]||"").trim()==="0";});
  var val=0;stock.forEach(function(r){var n=parseFloat(String(r["Prix"]).replace(",","."));if(!isNaN(n))val+=n;});
  function byCol(rows,col){var m={};rows.forEach(function(r){var v=(r[col]||"").trim()||"(vide)";m[v]=(m[v]||0)+1;});
    return Object.keys(m).sort(function(a,b){return m[b]-m[a];}).map(function(k){return "  "+k+" : "+m[k];}).join("\n");}
  var t=[];
  t.push("Cave à vin — Historique");
  t.push("Fichier : "+name+".csv");
  t.push("Généré le : "+stamp());
  t.push("");t.push("=== STATISTIQUES ===");
  t.push("Bouteilles en stock : "+stock.length);
  t.push("Bouteilles dégustées : "+bus.length);
  t.push("Valeur du stock : "+money(val));
  t.push("");t.push("Par couleur :");t.push(byCol(stock,"Couleur"));
  t.push("");t.push("Par pays :");t.push(byCol(stock,"Pays"));
  var byLoc=function(a,b){return entryLoc(a)-entryLoc(b);};
  var ctrls=state.session.filter(function(e){return e.type==="Inventaire";}).sort(byLoc);
  var mods=state.session.filter(function(e){return e.type!=="Inventaire";}).sort(byLoc);
  t.push("");t.push("=== MODIFICATIONS DE LA SESSION ("+mods.length+") ===");
  if(mods.length)mods.forEach(function(e){t.push("["+e.t+"] "+e.type+" — "+e.txt);});else t.push("(aucune)");
  t.push("");t.push("=== CONTRÔLES D'INVENTAIRE ("+ctrls.length+") ===");
  if(ctrls.length)ctrls.forEach(function(e){t.push("["+e.t+"] "+e.txt);});else t.push("(aucun)");
  t.push("");t.push("=== RÉSUMÉ ===");
  t.push(mods.length+" modification(s), "+ctrls.length+" contrôle(s) d'inventaire.");
  return t.join("\r\n")+"\r\n";
}
function doExport(name){
  var csv=serializeCSV(state.headers,state.data);
  var txt=buildTXT(name);
  var y=String(now().getFullYear());state.settings.counter[y]=(state.settings.counter[y]||0)+1;saveSettings();
  state.fileName=name;state.session=[];state.dirty=false;commit();
  shareOrShow(name,csv,txt);
}

      if(!navigator.canShare||navigator.canShare({files:files})){
        navigator.share({files:files,title:name}).then(function(){toast("Fichiers prêts — « Enregistrer dans Fichiers ».");go("accueil");}).catch(function(){showExportSheet(name,csv,txt);});
        return;

}

SCR.reglages=function(){

  var html="";

    html+='<button class="btn ghost" data-a="validation">Générer une nouvelle version</button>';}
  html+='<button class="btn flat" data-a="import">Importer un autre CSV</button>';
  html+='<button class="btn flat" data-a="go-modifmulti">Modification multiple</button>';
  html+='</div></div>';

  html+='<div class="section"><div class="lbl">Nom de projet (préfixe des fichiers)</div><div class="card"><input class="inp" id="set-projet" value="'+esc(st.projet)+'"><div class="tiny muted" style="margin-top:6px">Export : '+esc(st.projet)+'_'+yymmdd()+'_'+pad3((st.counter[String(now().getFullYear())]||0)+1)+'.csv</div></div></div>';

  var d=ensureDesign();

    +sliderRow("Taille du texte","dz-size",13,22,1,d.size,"px")
    +sliderRow("Interligne","dz-lh",1.15,1.7,0.05,d.lh,"")
    +sliderRow("Espacement","dz-pad",8,28,1,d.pad,"px")
    +sliderRow("Rayon des coins","dz-r",0,24,1,d.r,"px")
    +'</div></div>';
  html+='<div class="section"><div class="lbl">Design — accent rapide</div><div class="two">'
    +Object.keys(ACCENTS).map(function(k){var nm={bordeaux:"Bordeaux",bourgogne:"Bourgogne",ardoise:"Ardoise",foret:"Forêt"}[k];
      var onk=d.accent.toLowerCase()===ACCENTS[k].toLowerCase();

  html+='<div class="section"><div class="lbl">Design — couleurs</div><div class="card"><div class="swatches">'
    +colorRow("Accent","dz-accent",d.accent)+colorRow("Fond","dz-bg",d.bg)
    +colorRow("Cartes","dz-surface",d.surface)+colorRow("Panneaux","dz-surface2",d.surface2)
    +colorRow("Texte","dz-ink",d.ink)+colorRow("Texte doux","dz-soft",d.soft)
    +colorRow("Lignes","dz-line",d.line)+colorRow("Laiton","dz-brass",d.brass)
    +'</div><button class="btn flat" style="margin-top:14px" data-a="design-reset">Réinitialiser le design</button></div></div>';

  html+='<div class="section"><div class="lbl">Options</div><div class="card"><label class="ck" style="border:0;padding:0"><input type="checkbox" id="set-lastcave"'+(st.lastCave?" checked":"")+'> Mémoriser la dernière cave consultée</label>'
    +'<div class="tiny muted" style="margin-top:8px">Format de date affiché : 31.12.2026 · Températures en °C · Montants en CHF · Pas de mode sombre.</div></div></div>';

  html+='<div class="section"><div class="lbl">Sauvegarde des réglages</div><div class="card stack">'
    +'<div class="tiny muted">Les réglages (design, projet, options) sont déjà mémorisés automatiquement sur cet appareil. L\'export permet de les conserver hors de l\'app ou de les transférer sur un autre appareil.</div>'
    +'<button class="btn ghost" data-a="save-settings">Enregistrer les réglages (fichier)</button>'
    +'<button class="btn flat" data-a="import-settings">Importer des réglages</button>'
    +'</div></div>';

  html+='<div class="section"><div class="lbl">Zone sensible</div><div class="card stack">'
    +'<button class="btn danger" data-a="reset-session">Réinitialiser la session en cours</button>'
    +'<button class="btn flat" data-a="apropos">À propos</button></div></div>';
  document.getElementById("screen").innerHTML=html;

  var pj=document.getElementById("set-projet");if(pj)pj.addEventListener("change",function(){st.projet=pj.value.trim()||"Cave";saveSettings();});
  var lc=document.getElementById("set-lastcave");if(lc)lc.addEventListener("change",function(){st.lastCave=lc.checked;saveSettings();});
  function bindSlider(id,key,unit,dp){var el=document.getElementById(id);if(!el)return;el.addEventListener("input",function(){var v=parseFloat(el.value);state.settings.design[key]=v;var lab=document.getElementById(id+"-v");if(lab)lab.textContent=(dp?v.toFixed(dp):v)+(unit?" "+unit:"");applyTheme();saveSettings();});}

  bindColor("dz-accent","accent");bindColor("dz-bg","bg");bindColor("dz-surface","surface");bindColor("dz-surface2","surface2");bindColor("dz-ink","ink");bindColor("dz-soft","soft");bindColor("dz-line","line");bindColor("dz-brass","brass");
  document.querySelectorAll("[data-set-accent]").forEach(function(b){b.addEventListener("click",function(){state.settings.design.accent=b.dataset.setAccent;saveSettings();applyTheme();render();});});
};

/* ============================================================= *
 * ÉVÉNEMENTS
 * ============================================================= */
document.addEventListener("click",function(ev){
  var t=ev.target.closest("[data-a],[data-tab],[data-set-size],[data-set-accent],[data-set-projet]");
  if(t&&t.dataset.tab){go(t.dataset.tab);return;}
  if(!t||!t.dataset.a)return;
  var a=t.dataset.a,id=t.dataset.id;
  switch(a){
    case "import":document.getElementById("fileInput").click();break;
    case "demo":loadDemo();go("accueil");break;
    case "closeModal":closeModal();break;
    case "uic-no":closeModal();UIC.cb=null;break;
    case "uic-yes":{var _cb=UIC.cb;UIC.cb=null;closeModal();if(_cb)_cb();}break;
    case "cave":go("cave",{c:+t.dataset.c});break;
    case "fiche":go("fiche",{id:id,from:t.dataset.from});break;
    case "go-recherche":go("recherche");break;
    case "recherche":go("recherche");break;
    case "sel-view":SS.selView=!SS.selView;runSearch();break;
    case "sel-clear":SS.sel={};SS.selView=false;runSearch();break;
    case "go-modifmulti":go("modifmulti");break;
    case "validation":go("validation");break;
    case "accueil":go("accueil");break;
    case "apropos":go("apropos");break;
    case "ajout":sheetAjout(id);break;
    case "deguster":sheetDeguster(id);break;
    case "deplacer":sheetDeplacer(id);break;
    case "modifier":sheetModifier(id);break;
    case "do-deguster":doDeguster(t.dataset.key);break;
    case "do-deplacer":doDeplacer(t.dataset.key);break;
    case "do-modifier":doModifier(t.dataset.key);break;
    case "do-ajout":doAjout();break;
    case "mm-apply":mmApply();break;
    case "mm-all":var s=state.route.p;var rows=state.data.filter(isStock);var all=rows.every(function(r){return s.sel[r._id];});rows.forEach(function(r){s.sel[r._id]=!all;});render();break;
    case "do-export":doExport(t.dataset.name);break;
    case "exp-copy":{var eta=document.getElementById(t.dataset.t==="csv"?"exp-csv":"exp-txt");if(eta){eta.focus();eta.select();try{eta.setSelectionRange(0,eta.value.length);}catch(e){}var ok=false;try{ok=document.execCommand("copy");}catch(e){}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(eta.value).catch(function(){});ok=true;}toast(ok?"Copié.":"Sélectionnez le texte puis copiez.");}}break;
    case "exp-close":closeModal();go("accueil");break;
    case "design-reset":state.settings.design=Object.assign({},DESIGN_DEFAULT);saveSettings();applyTheme();render();break;
    case "save-settings":settingsExport();break;
    case "import-settings":settingsImport();break;
    case "setexp-copy":{var sjt=document.getElementById("set-json");if(sjt){sjt.focus();sjt.select();try{sjt.setSelectionRange(0,sjt.value.length);}catch(e){}var sok=false;try{sok=document.execCommand("copy");}catch(e){}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(sjt.value).catch(function(){});sok=true;}toast(sok?"Copié.":"Sélectionnez le texte puis copiez.");}}break;
    case "setimp-apply":settingsImportApply();break;
    case "reset-session":uiConfirm("Effacer les modifications en attente et repartir de l'import ? Votre CSV d'origine n'est pas touché.",function(){lsDel(K.snap);state.session=[];state.dirty=false;state.loaded=false;state.data=[];state.inv={cave:null,ligne:null,casier:null,progress:{}};go("accueil");});break;
    // liste par cave — sens du tri
    case "cave-dir":state.route.p.dir=(state.route.p.dir==="desc"?"asc":"desc");SCR.cave(state.route.p);break;
    // inventaire
    case "inv-cave":state.inv.cave=+t.dataset.c;state.inv.ligne=null;state.inv.casier=null;state.inv.expand=false;go("inventaire");break;
    case "inv-ligne":state.inv.ligne=+t.dataset.l;state.inv.casier=null;state.inv.expand=false;go("inventaire");break;
    case "inv-casier":state.inv.casier=+t.dataset.k;state.inv.expand=false;go("inventaire");break;
    case "inv-expand":state.inv.expand=true;go("inventaire");break;
    case "inv-mancas":var mc=+document.getElementById("mancas").value;if(mc){state.inv.casier=mc;state.inv.expand=false;go("inventaire");}break;
    case "inv-prev":{var cas=casiersOf(state.inv.cave,state.inv.ligne);var i=cas.indexOf(state.inv.casier);if(i>0){invSaveCurrent();state.inv.casier=cas[i-1];go("inventaire");}}break;
    case "inv-next":{var cas2=casiersOf(state.inv.cave,state.inv.ligne);var j=cas2.indexOf(state.inv.casier);if(j<cas2.length-1){invSaveCurrent();state.inv.casier=cas2[j+1];go("inventaire");}}break;
    case "inv-finish":invFinish();break;
    case "inv-reset-casier":{var rloc=buildLoc(state.inv.cave,state.inv.ligne,state.inv.casier);if(state.inv.progress[rloc])uiConfirm("Réinitialiser le contrôle de ce casier ?",function(){delete state.inv.progress[rloc];commit();renderInv();});}break;
    case "inv-reset-all":if(Object.keys(state.inv.progress).length)uiConfirm("Réinitialiser tout l'inventaire en cours ? Les pointages non appliqués seront perdus.",function(){state.inv.progress={};state.inv.casier=null;state.inv.expand=false;commit();renderInv();});break;
  }
});
/* boutons steppers dans les feuilles */
document.addEventListener("click",function(ev){
  var s=ev.target.closest("[data-mstep]");if(!s)return;
  var el=document.getElementById(s.dataset.mstep);var v=Math.max(1,(+el.dataset.v)+(+s.dataset.d));
  el.dataset.v=v;el.textContent=v;
});
/* boutons inventaire (présent/count/étiquette/note) */
document.addEventListener("click",function(ev){
  var b=ev.target.closest("[data-il]");if(!b)return;var key=b.dataset.k;var lot=invLot(key);
  if(b.dataset.il==="present"){
    if(b.dataset.v==="1"){var lots=lotsOfCasier(state.inv.cave,state.inv.ligne,state.inv.casier);var g=null;for(var gi=0;gi<lots.length;gi++)if(lots[gi].key===key)g=lots[gi];
      if(lot.status!=="present")lot.count=g?g.count:0;lot.status="present";}
    else{lot.status="absent";lot.count=0;lot.etiq=null;}
    commit();renderInv();return;}
  if(b.dataset.il==="etiq"){if(lot.status!=="present")return;lot.etiq=b.dataset.v;commit();renderInv();return;}
  if(b.dataset.il==="inc"){if(lot.status!=="present")return;lot.count++;commit();renderInv();return;}
  if(b.dataset.il==="dec"){if(lot.status!=="present")return;lot.count=Math.max(0,lot.count-1);commit();renderInv();return;}
});
document.addEventListener("input",function(ev){
  var n=ev.target.closest("[data-il='note']");if(!n)return;invLot(n.dataset.k).note=n.target?n.target.value:n.value;
});
function invSaveCurrent(){var iv=state.inv;if(!iv.casier)return;var loc=buildLoc(iv.cave,iv.ligne,iv.casier);
  if(!iv.progress[loc])iv.progress[loc]={lots:{}};saveSnapshot();}
function invFinish(){
  if(!inventoryReady()){var inc=incompleteCasiers().map(function(l){var p=parseLoc(l);return p.cave+"·"+p.ligne+"/"+p.casier;});
    toast("Terminer indisponible : "+inc.join(", ")+" — pointez chaque vin (Présent/Absent).");return;}
  var iv=state.inv;var locs=Object.keys(iv.progress);var applied=0;
  locs.forEach(function(loc){var p=iv.progress[loc];var lots=p.lots||{};
    for(var key in lots){var lp=lots[key];
      var rows=state.data.filter(function(r){return isStock(r)&&(r["Localisation"]||"").trim()===loc&&wineKey(r)===key;});
      var expected=rows.length;var name=rows[0]?rows[0]["Propriété"]+" "+rows[0]["Année"]:key;
      if(lp.status==="absent"){rows.forEach(function(r){r["En cave"]="2";});logChange("Inventaire",loc+" · "+name+" : absent (attendu "+expected+") → à contrôler");applied++;if(lp.note)logChange("Inventaire",loc+" · "+name+" : "+lp.note);}
      else if(lp.status==="present"){
        if(lp.count<expected){var diff=expected-lp.count;for(var i=0;i<diff;i++)rows[i]["En cave"]="2";logChange("Inventaire",loc+" · "+name+" : "+lp.count+"/"+expected+" présentes → "+diff+" à contrôler");applied++;}
        else if(lp.count>expected){logChange("Inventaire",loc+" · "+name+" : "+lp.count+" trouvées (attendu "+expected+"), ajouter les manquantes");applied++;}
        if(lp.etiq==="Non"){logChange("Inventaire",loc+" · "+name+" : étiquette absente");applied++;}
        if(lp.note){logChange("Inventaire",loc+" · "+name+" : "+lp.note);applied++;}
      }
      else if(lp.note){logChange("Inventaire",loc+" · "+name+" : "+lp.note);applied++;}
    }});
  iv.progress={};iv.casier=null;
  commit();
  toast(applied?applied+" constat(s) enregistré(s). Validez pour générer le CSV.":"Aucun écart constaté.");
  go(state.dirty?"validation":"accueil");
}

/* ---------- Import fichier ---------- */
document.getElementById("fileInput").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;var reader=new FileReader();
  reader.onload=function(){var txt=reader.result;
    var parsed=rowsToObjects(parseCSV(txt));
    if(!parsed.data.length){toast("Fichier vide ou illisible.");return;}
    var miss=["Propriété","En cave","Localisation"].filter(function(c){return parsed.headers.indexOf(c)===-1;});
    parsed.data.headers=parsed.headers;
    var objs=parsed.data;objs.headers=parsed.headers;
    loadData(objs,file.name.replace(/\.csv$/i,""));
    if(miss.length)toast("Colonnes manquantes : "+miss.join(", ")+".");
    go("accueil");
  };
  reader.onerror=function(){toast("Impossible de lire le fichier.");};
  reader.readAsText(file,"utf-8");
  e.target.value="";
});

/* ============================================================= *
 * DÉMARRAGE
 * ============================================================= */
(function init(){
  loadSettings();loadLists();applyTheme();
  var snap=readSnapshot();
  if(snap&&snap.data&&snap.data.length){
    applySnapshot(snap);
    // Proposer la reprise (R028)
    openSheet('<h2>Reprendre la session ?</h2><p class="small muted" style="margin-bottom:14px">Fichier : <b>'+esc(snap.fileName||"(sans nom)")+'</b> · '+snap.data.length+' bouteille(s)'+(snap.dirty?' · '+ (snap.session?snap.session.length:0)+' modif. en attente':"")+'.</p>'
      +'<div class="btnrow"><button class="btn flat" data-a="restart-new">Recommencer</button><button class="btn" data-a="resume">Reprendre</button></div>');
    render();
  }else{render();}
})();
document.addEventListener("click",function(ev){var t=ev.target.closest("[data-a]");if(!t)return;
  if(t.dataset.a==="resume"){closeModal();go("accueil");}
  if(t.dataset.a==="restart-new"){closeModal();lsDel(K.snap);state.loaded=false;state.data=[];go("accueil");}
});
</script>
